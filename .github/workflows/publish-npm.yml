name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - run: npm publish --access public
